# tools.toml — Tool Manifest v1
# Single source of truth for all built-in tool metadata.
# Consumers (ClusterRegistry / SilentRouter / scene_active_prefixes /
# cost_suffix / short_description / tool_catalog) ALL derive from this file.
# Edit here → all 6 sources stay in sync automatically.
#
# Convention:
# - Every tool that appears in schemas() must appear here, even if partial fields.
# - External/MCP/Plugin/Skill tools are NOT in this file (they register dynamically).
manifest_version = "1.0"

# ─── Cluster purposes ────────────────────────────────────────────────
# Used by ClusterRegistry::builtin() to set each cluster's purpose string.
[cluster]
session_history = "Access content/state from past or current sessions"
interaction_checkpoint = "Navigate the current session's interaction map (checkpoints/path)"
session_meta = "Session-level meta operations (focus/permission/introspect)"
knowledge_base = "Retrieve from the knowledge base (KB chunks + memory palace)"
fs_read_discover = "Read files or discover filesystem entries"
fs_write_mutate = "Modify files (DESTRUCTIVE — verify intent before calling)"
db_read = "Read from SQLite databases (no side effects)"
web_io = "Fetch from the live web"

# ─── Scene→prefix mappings ──────────────────────────────────────────
# Controls which tools get full mode definitions in build_tool_definitions_for.
# Mirrors the old scene_active_prefixes() match function.
# NOTE: `_default` is the catch-all for unknown task_kinds.
[scene]
code_writing   = ["fs_", "bash", "code", "cargo"]
code_reading   = ["fs_", "bash", "code", "cargo"]
debugging      = ["fs_", "bash", "code", "cargo", "test"]
web_search     = ["web", "fetch", "search", "browse"]
file_edit      = ["fs_", "bash"]
data_analysis  = ["fs_", "bash", "code", "db", "data"]
mathematics    = ["code", "math", "bash"]
architecture   = ["fs_", "bash", "code"]
review         = ["fs_", "bash", "code", "lint", "test"]
knowledge_query = ["kb", "search", "web", "fetch"]
_default       = ["fs_read", "fs_write", "fs_edit", "bash", "web"]

# ─── Tool entries ────────────────────────────────────────────────────
# Fields:
#   name             — tool_id (must match dispatch match arm)
#   description      — full description sent to LLM
#   short_description— ≤50 chars, used when >12 tools active (short-mode)
#   cluster          — cluster ID for ClusterRegistry grouping (omit = singleton)
#   differentiator   — sibling disambiguation hint (omit = no cluster entry)
#   tokens           — estimated token cost for LLM suffix display
#   latency          — human-readable latency string
#   risk             — "low" / "medium" / "high"
#   confirm          — whether MCIP confirm dialog is required
#   idempotent       — true for reads, false for writes/mutations
#   domains          — SilentRouter domain IDs (omit = empty)
#   actions          — SilentRouter action tags (omit = empty)
#   scenes           — applicable task_kinds (omit = all scenes)

[[tool]]
name = "fs_read"
description = "读取文件完整内容（支持单 path 字符串或 paths 数组批量）"
