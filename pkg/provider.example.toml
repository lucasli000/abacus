# ============================================================
# AbacusCode 供应商配置
# ============================================================
#
# 文件位置: ~/.abacus/provider.toml
# 这是 LLM 供应商的唯一配置入口
#
# 旧版 llm.* 配置键已废弃，请迁移到本文件
#
# ============================================================

# DeepSeek
[[providers]]
id = "deepseek"
type = "deepseek"
api_key = "env:DEEPSEEK_API_KEY"     # 从环境变量读取
base_url = "https://api.deepseek.com"

