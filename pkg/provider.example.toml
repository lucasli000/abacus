# ============================================================
# 模型配置 (可选)
# ============================================================
#
# 每个 provider 可以配置多个 model:
#
# [[providers]]
# id = "deepseek"
# type = "deepseek"
# api_key = "env:DEEPSEEK_API_KEY"
#
# [[providers.models]]
# name = "deepseek-v4-flash"
# context_window = 1000000
# max_tokens = 384000
# temperature = 0.6
#
# [[providers.models]]
# name = "deepseek-v4-pro"
# context_window = 1000000
# max_tokens = 384000
# temperature = 0.6

# ============================================================
# api_key 语法
# ============================================================
#
# 直接值:
#   api_key = "sk-abc123..."
#
# 环境变量引用:
#   api_key = "env:MY_API_KEY"
#
# 空值 (如 local ollama):
#   api_key = ""
#
# 无 key (某些 local provider):
#   省略 api_key 字段
