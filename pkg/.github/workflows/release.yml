name: Release v2.5.5

on:
  push:
    tags:
      - 'v2.5.5'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: abacus

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: abacus-aarch64-apple-darwin
            asset_name: abacus-aarch64-apple-darwin.tar.gz
          
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: abacus-x86_64-unknown-linux-gnu
            asset_name: abacus-x86_64-linux-gnu.tar.gz
          
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: abacus-x86_64-pc-windows-msvc
            asset_name: abacus-x86_64-windows-msvc.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        working-directory: pkg
        run: |
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_DIR: target

      - name: Strip binary (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          strip pkg/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Create archive (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd pkg/target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }} ${{ env.BINARY_NAME }}
          cd ../../..

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd pkg/target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.asset_name }} ${{ env.BINARY_NAME }}.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -o -name "*.zip" | while read f; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.5.5
          name: "AbacusCode v2.5.5"
          body: |
            # AbacusCode v2.5.5

            ## 🔒 安全增强

            - 注入检测 Unicode 防护: normalize_for_injection() 去除零宽字符
            - 注入模式可配置化: SafetyGuard.user_injection_patterns
            - ActionClassifier 历史感知: classify_with_history()
            - PathOutsideCwd 路径规范化: 防止遍历绕过
            - 429 errors 排除 fallback

            ## 🧠 自学习循环

            - 经验注入器: tool description 注入 [unreliable] / [N failures] 标记
            - 经验验证器: PostToolUse 事件后更新 EffectivenessTracker
            - 反模式泛化器: detect_environment_issue() + detect_failure_pattern()
            - validate_trust / consecutive_failures / should_avoid

            ## 🏗️ 架构改进

            - run.rs 子函数提取: process_engine_response() + process_streaming_chunks()
            - EventBus 双向订阅: subscribe() 返回 UnboundedReceiver
            - ConfigManager 变更检测: changed_keys + drain_changes()
            - CoreConfig::from_config_manager 统一配置绑定
            - TaskRegistry 多任务并发管理 + Drop impl
            - reset_session() 增强: 保留 infra 级数据

            ## 🎯 阈值优化

            - tool_calls 50→75, timeout 600→1200, budget 80/90/98
            - Hot 80-90% → 85-95%, Critical >90% → >95%
            - confirm_timeout 60→120s

            ## 🔧 其他

            - 5 个内置技能: code_quality_gate, TDD, debugging, verification, review-matrix
            - payload-guard: 大文件读取警告
            - ResourceGuard: 跨会话资源锁
            - CJK display_width 修正

            ## 📦 Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (arm64) | `abacus-aarch64-apple-darwin.tar.gz` |
            | Linux | x86_64 | `abacus-x86_64-linux-gnu.tar.gz` |
            | Windows | x86_64 | `abacus-x86_64-windows-msvc.zip` |

            ## 🔧 Installation

            ```bash
            # macOS/Linux
            tar xzf abacus-*.tar.gz
            sudo mv abacus /usr/local/bin/

            # Windows
            # Extract zip and add to PATH
            ```

            ## 📊 Stats

            - 1,814 tests pass
            - 0 warnings
            - 0 errors
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
