<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Compact 64x64 version — 1024 on abacus
    Thick frame, thin rods, solid=active, hollow=inactive
  -->
  <!-- Frame -->
  <rect x="4" y="4" width="56" height="56" stroke="black" stroke-width="3" fill="white"/>
  <!-- Beam -->
  <rect x="4" y="22" width="56" height="2" fill="black"/>
  <!-- Rods (thin) -->
  <line x1="18" y1="4" x2="18" y2="60" stroke="black" stroke-width="0.75"/>
  <line x1="32" y1="4" x2="32" y2="60" stroke="black" stroke-width="0.75"/>
  <line x1="46" y1="4" x2="46" y2="60" stroke="black" stroke-width="0.75"/>
  <!-- Upper beads (at rest, all at top) -->
  <rect x="13" y="9" width="10" height="5" rx="2.5" fill="black"/>
  <rect x="27" y="9" width="10" height="5" rx="2.5" fill="black"/>
  <rect x="41" y="9" width="10" height="5" rx="2.5" fill="black"/>
  <!-- Lower: Thousands=1 (1 up) -->
  <rect x="13" y="28" width="10" height="5" rx="2.5" fill="black"/>
  <rect x="14" y="40" width="8" height="4" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <rect x="14" y="48" width="8" height="4" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <!-- Lower: Hundreds=0 (none up) -->
  <rect x="28" y="36" width="8" height="4" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <rect x="28" y="44" width="8" height="4" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <rect x="28" y="52" width="8" height="4" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <!-- Lower: Tens=2 (2 up) -->
  <rect x="41" y="28" width="10" height="5" rx="2.5" fill="black"/>
  <rect x="41" y="37" width="10" height="5" rx="2.5" fill="black"/>
  <rect x="42" y="50" width="8" height="4" rx="2" fill="none" stroke="black" stroke-width="1"/>
</svg>
