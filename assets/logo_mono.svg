<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!--
    Compact 80x80 — 1024, horizontal beads, no frame gap
  -->
  <!-- Frame (closed, no gap) -->
  <rect x="6" y="6" width="68" height="58" rx="0" stroke="black" stroke-width="2.5" fill="white"/>
  <!-- Beam -->
  <rect x="6" y="24" width="68" height="1.5" fill="black"/>
  <!-- Rods -->
  <line x1="20" y1="8" x2="20" y2="62" stroke="black" stroke-width="0.5"/>
  <line x1="36" y1="8" x2="36" y2="62" stroke="black" stroke-width="0.5"/>
  <line x1="52" y1="8" x2="52" y2="62" stroke="black" stroke-width="0.5"/>
  <line x1="68" y1="8" x2="68" y2="62" stroke="black" stroke-width="0.5"/>

  <!-- Upper beads (horizontal, outlined = resting) -->
  <rect x="12" y="12" width="16" height="5" rx="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="28" y="12" width="16" height="5" rx="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="44" y="12" width="16" height="5" rx="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="60" y="12" width="16" height="5" rx="2.5" fill="none" stroke="black" stroke-width="0.8"/>

  <!-- Lower: Thousands=1: ■ □ □ □ -->
  <rect x="12" y="30" width="16" height="5" rx="2.5" fill="black"/>
  <rect x="13" y="40" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>
  <rect x="13" y="48" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>
  <rect x="13" y="56" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>

  <!-- Lower: Hundreds=0: □ □ □ □ -->
  <rect x="29" y="38" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>
  <rect x="29" y="46" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>
  <rect x="29" y="54" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>

  <!-- Lower: Tens=2: ■ ■ □ □ -->
  <rect x="44" y="30" width="16" height="5" rx="2.5" fill="black"/>
  <rect x="44" y="39" width="16" height="5" rx="2.5" fill="black"/>
  <rect x="45" y="50" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>
  <rect x="45" y="58" width="14" height="4" rx="2" fill="none" stroke="black" stroke-width="0.6"/>

  <!-- Lower: Ones=4: ■ ■ ■ ■ -->
  <rect x="60" y="30" width="16" height="5" rx="2.5" fill="black"/>
  <rect x="60" y="39" width="16" height="5" rx="2.5" fill="black"/>
  <rect x="60" y="48" width="16" height="5" rx="2.5" fill="black"/>
  <rect x="60" y="57" width="16" height="5" rx="2.5" fill="black"/>

  <!-- Wordmark -->
  <text x="40" y="76" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="6.5" font-weight="200" letter-spacing="2.5" fill="black">ABACUS</text>
</svg>
