<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Frame -->
  <rect x="6" y="6" width="52" height="52" rx="6" stroke="#3B82F6" stroke-width="3"/>
  <!-- Beam -->
  <rect x="12" y="30" width="40" height="2" rx="1" fill="#3B82F6"/>
  <!-- Rods -->
  <line x1="20" y1="12" x2="20" y2="52" stroke="#64748B" stroke-width="1.5"/>
  <line x1="32" y1="12" x2="32" y2="52" stroke="#64748B" stroke-width="1.5"/>
  <line x1="44" y1="12" x2="44" y2="52" stroke="#64748B" stroke-width="1.5"/>
  <!-- Upper beads -->
  <circle cx="20" cy="18" r="4" fill="#3B82F6"/>
  <circle cx="32" cy="22" r="4" fill="#3B82F6"/>
  <circle cx="44" cy="16" r="4" fill="#3B82F6"/>
  <!-- Lower beads -->
  <circle cx="20" cy="38" r="4" fill="#3B82F6"/>
  <circle cx="20" cy="48" r="4" fill="#3B82F6"/>
  <circle cx="32" cy="40" r="4" fill="#3B82F6"/>
  <circle cx="32" cy="50" r="4" fill="#3B82F6"/>
  <circle cx="44" cy="36" r="4" fill="#3B82F6"/>
  <circle cx="44" cy="46" r="4" fill="#3B82F6"/>
</svg>
