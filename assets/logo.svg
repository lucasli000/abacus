<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" fill="none">
  <!--
    ABACUS LOGO — 1024
    Beads: wide-flat horizontal capsules (48×10, rx=5)
    Activated: stroke 2.5px (bold presence)
    Resting: stroke 0.8px (light)
    4 rods at x=88, 144, 200, 256 (spacing 56px)
  -->

  <!-- FRAME -->
  <rect x="40" y="20" width="280" height="168" rx="0" stroke="black" stroke-width="4" fill="white"/>

  <!-- BEAM -->
  <rect x="40" y="72" width="280" height="2.5" fill="black"/>

  <!-- RODS -->
  <line x1="88"  y1="24" x2="88"  y2="184" stroke="black" stroke-width="0.7"/>
  <line x1="144" y1="24" x2="144" y2="184" stroke="black" stroke-width="0.7"/>
  <line x1="200" y1="24" x2="200" y2="184" stroke="black" stroke-width="0.7"/>
  <line x1="256" y1="24" x2="256" y2="184" stroke="black" stroke-width="0.7"/>

  <!-- UPPER DECK — all resting (thin, near top) -->
  <rect x="64"  y="38" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="120" y="38" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="176" y="38" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="232" y="38" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="0.8"/>

  <!-- LOWER DECK -->
  <!-- Rod 1 (千=1): ● ○ ○ ○ -->
  <rect x="64"  y="84"  width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <rect x="66"  y="108" width="44" height="9"  rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="66"  y="130" width="44" height="9"  rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="66"  y="152" width="44" height="9"  rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>

  <!-- Rod 2 (百=0): ○ ○ ○ ○ -->
  <rect x="122" y="104" width="44" height="9" rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="122" y="126" width="44" height="9" rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="122" y="148" width="44" height="9" rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="122" y="170" width="44" height="9" rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>

  <!-- Rod 3 (十=2): ● ● ○ ○ -->
  <rect x="176" y="84"  width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <rect x="176" y="106" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <rect x="178" y="132" width="44" height="9"  rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>
  <rect x="178" y="154" width="44" height="9"  rx="4.5" fill="white" stroke="black" stroke-width="0.8"/>

  <!-- Rod 4 (个=4): ● ● ● ● -->
  <rect x="232" y="84"  width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <rect x="232" y="106" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <rect x="232" y="128" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="2.5"/>
  <rect x="232" y="150" width="48" height="10" rx="5" fill="white" stroke="black" stroke-width="2.5"/>

  <!-- WORDMARK -->
  <text x="180" y="208" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="13" font-weight="200" letter-spacing="7" fill="black">ABACUS</text>
</svg>
