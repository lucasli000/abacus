<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!--
    Abacus representing 1024
    Top section: upper beads (heaven, worth 5 each)
    Bottom section: lower beads (earth, worth 1 each)
    Rods left to right: Thousands(1), Hundreds(0), Tens(2), Ones(4)
  -->

  <!-- Frame - thick outer lines -->
  <rect x="40" y="20" width="240" height="160" stroke="black" stroke-width="6" fill="white"/>

  <!-- Beam (divider between upper and lower) - bold -->
  <rect x="40" y="68" width="240" height="4" fill="black"/>

  <!-- Rods - thin vertical lines -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="160" y1="20" x2="160" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="220" y1="20" x2="220" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="280" y1="20" x2="280" y2="180" stroke="black" stroke-width="0.8" stroke-dasharray="2,4" opacity="0.3"/>

  <!-- === UPPER BEADS (worth 5) - wider/bolder === -->
  <!-- All upper beads resting at top (not activated for 1024) -->
  <!-- Thousands(1): upper bead at rest (top) -->
  <rect x="88" y="30" width="24" height="10" rx="5" fill="black"/>
  <!-- Hundreds(0): upper bead at rest -->
  <rect x="148" y="30" width="24" height="10" rx="5" fill="black"/>
  <!-- Tens(2): upper bead at rest -->
  <rect x="208" y="30" width="24" height="10" rx="5" fill="black"/>

  <!-- === LOWER BEADS (worth 1) === -->
  <!-- Thousands rod = 1: 1 bead UP (against beam), 3 beads DOWN -->
  <rect x="88" y="82" width="24" height="10" rx="5" fill="black"/>
  <rect x="90" y="118" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="90" y="138" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="90" y="158" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Hundreds rod = 0: all 4 beads DOWN (none against beam) -->
  <rect x="150" y="108" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="150" y="128" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="150" y="148" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="150" y="168" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Tens rod = 2: 2 beads UP, 2 beads DOWN -->
  <rect x="208" y="82" width="24" height="10" rx="5" fill="black"/>
  <rect x="208" y="100" width="24" height="10" rx="5" fill="black"/>
  <rect x="210" y="148" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="210" y="168" width="20" height="8" rx="4" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Ones rod = 4: 4 beads UP (all against beam) -->
  <!-- 暗示第四杆不完整（虚线杆）但珠满 -->

  <!-- Text: ABACUS - clean, spaced, below frame -->
  <text x="160" y="198" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="300" letter-spacing="6" fill="black">ABACUS</text>
</svg>
