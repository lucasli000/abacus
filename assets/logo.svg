<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!--
    ABACUS LOGO — 1024 encoded
    Design: Black/white, 3-tier line weights
    Beads: horizontal rounded rectangles (横置算珠)
    Frame: continuous closed rectangle (无缺口)
    Encoding: 千(1) 百(0) 十(2) 个(4)
  -->

  <!-- === FRAME — continuous closed border === -->
  <rect x="60" y="30" width="280" height="190" rx="0" stroke="black" stroke-width="5" fill="white"/>

  <!-- === BEAM — horizontal divider === -->
  <rect x="60" y="92" width="280" height="3" fill="black"/>

  <!-- === RODS — vertical thin lines (不穿透 frame，仅在内部) === -->
  <line x1="130" y1="35" x2="130" y2="215" stroke="black" stroke-width="1.2"/>
  <line x1="200" y1="35" x2="200" y2="215" stroke="black" stroke-width="1.2"/>
  <line x1="270" y1="35" x2="270" y2="215" stroke="black" stroke-width="1.2"/>
  <line x1="340" y1="35" x2="340" y2="215" stroke="black" stroke-width="0.6" stroke-dasharray="none" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- UPPER DECK — 1 bead per rod (天珠, worth 5) -->
  <!-- All resting (not activated for 1024)        -->
  <!-- Bead shape: 横置圆角矩形 (wide, short)       -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Thousands: upper bead resting at top -->
  <rect x="108" y="48" width="44" height="14" rx="7" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Hundreds -->
  <rect x="178" y="48" width="44" height="14" rx="7" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Tens -->
  <rect x="248" y="48" width="44" height="14" rx="7" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Ones -->
  <rect x="318" y="48" width="44" height="14" rx="7" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LOWER DECK — 4 beads per rod (地珠, worth 1) -->
  <!-- Activated = filled (pushed up to beam)       -->
  <!-- Resting = outlined (away from beam)          -->
  <!-- Bead spacing: 26px vertical                  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Thousands rod = 1: ■ □ □ □ -->
  <rect x="108" y="104" width="44" height="14" rx="7" fill="black"/>
  <rect x="112" y="134" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="112" y="160" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="112" y="186" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>

  <!-- Hundreds rod = 0: □ □ □ □ -->
  <rect x="182" y="130" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="182" y="156" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="182" y="182" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="182" y="200" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="0.8" opacity="0.35"/>

  <!-- Tens rod = 2: ■ ■ □ □ -->
  <rect x="248" y="104" width="44" height="14" rx="7" fill="black"/>
  <rect x="248" y="130" width="44" height="14" rx="7" fill="black"/>
  <rect x="252" y="164" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="252" y="190" width="36" height="12" rx="6" fill="none" stroke="black" stroke-width="1.2"/>

  <!-- Ones rod = 4: ■ ■ ■ ■ -->
  <rect x="318" y="104" width="44" height="14" rx="7" fill="black"/>
  <rect x="318" y="130" width="44" height="14" rx="7" fill="black"/>
  <rect x="318" y="156" width="44" height="14" rx="7" fill="black"/>
  <rect x="318" y="182" width="44" height="14" rx="7" fill="black"/>

  <!-- === DIGIT LABELS === -->
  <text x="130" y="234" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10" font-weight="300" fill="black" opacity="0.4">1</text>
  <text x="200" y="234" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10" font-weight="300" fill="black" opacity="0.4">0</text>
  <text x="270" y="234" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10" font-weight="300" fill="black" opacity="0.4">2</text>
  <text x="340" y="234" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10" font-weight="300" fill="black" opacity="0.4">4</text>

  <!-- === WORDMARK === -->
  <text x="200" y="268" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="16" font-weight="200" letter-spacing="10" fill="black">ABACUS</text>
</svg>
