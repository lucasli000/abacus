name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: abacus-aarch64-apple-darwin
            asset_name: abacus-aarch64-apple-darwin.tar.gz
            node_suffix: darwin-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: abacus-x86_64-linux-gnu
            asset_name: abacus-x86_64-linux-gnu.tar.gz
            node_suffix: linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build NAPI bridge
        working-directory: pkg
        run: cargo build --release --package abacus-bridge --target ${{ matrix.target }}

      - name: Install TUI dependencies
        working-directory: pkg/abacus-tui
        run: bun install

      - name: Copy native bridge
        working-directory: pkg
        run: |
          BRIDGE_SRC="target/${{ matrix.target }}/release/libabacus_bridge"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp "${BRIDGE_SRC}.dylib" abacus-tui/abacus-bridge.${{ matrix.node_suffix }}.node
          else
            cp "${BRIDGE_SRC}.so" abacus-tui/abacus-bridge.${{ matrix.node_suffix }}.node
          fi

      - name: Build TypeScript TUI
        working-directory: pkg/abacus-tui
        run: bun run build.ts

      - name: Package
        working-directory: pkg/abacus-tui
        run: |
          mkdir -p dist
          cp dist/abacus dist/abacus-${{ matrix.target }}
          cp abacus-bridge.${{ matrix.node_suffix }}.node dist/
          cd dist
          tar czf ../../${{ matrix.asset_name }} abacus-${{ matrix.target }} abacus-bridge.${{ matrix.node_suffix }}.node

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -o -name "*.zip" | while read f; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Abacus ${{ github.ref_name }}"
          body: |
            # Abacus ${{ github.ref_name }}

            ## TypeScript TUI Migration
            - Migrated from Rust ratatui to OpenTUI + XState + Zustand
            - OKLCH color system with 11 themes
            - Responsive layout (4 breakpoints)
            - Scene-aware UI (Trading/Coding/Editing)

            ## External Agent System
            - Install and manage external agents via MCP protocol
            - AgentManifest, AgentRegistry, AgentSkillExecutor
            - CLI: `abacus agent install/list/remove/info`

            ## LLM Provider Fixes
            - Unified StreamingToolCallCollector
            - Fixed Anthropic/OpenAI streaming tool calls
            - Complete Gemini tool calling support

            ## Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (arm64) | `abacus-aarch64-apple-darwin.tar.gz` |
            | Linux | x86_64 | `abacus-x86_64-linux-gnu.tar.gz` |

            ## Installation

            ```bash
            # macOS/Linux
            tar xzf abacus-*.tar.gz
            sudo mv abacus-* /usr/local/bin/abacus
            sudo mv abacus-bridge.*.node /usr/local/bin/
            ```
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
