name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: abacus

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: abacus-aarch64-apple-darwin
            asset_name: abacus-aarch64-apple-darwin.tar.gz

          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: abacus-x86_64-linux-gnu
            asset_name: abacus-x86_64-linux-gnu.tar.gz

          # Windows x86_64 — 临时禁用（process_group 跨平台问题单独修）
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   artifact_name: abacus-x86_64-windows-msvc
          #   asset_name: abacus-x86_64-windows-msvc.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc -y

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        working-directory: pkg
        run: |
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_DIR: target

      - name: Strip binary (macOS/Linux)
        working-directory: pkg
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Create archive (macOS/Linux)
        working-directory: pkg
        if: matrix.os != 'windows-latest'
        run: |
          tar czf ../${{ matrix.asset_name }} -C target/${{ matrix.target }}/release ${{ env.BINARY_NAME }}

      - name: Create archive (Windows)
        working-directory: pkg
        if: matrix.os == 'windows-latest'
        run: |
          7z a ../${{ matrix.asset_name }} target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -o -name "*.zip" | while read f; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AbacusCode ${{ github.ref_name }}"
          body: |
            # AbacusCode v2.5.0

            ## 系统提示词架构重构（-62% token）
            - 稳定前缀从 ~650 tok 压缩到 ~250 tok，prefix cache 命中率大幅提升
            - 5 层合并为 1 层 Strategy（原 Strategy + Quality Bar + Task Completion + Entropy Guard + Explicit Declaration）
            - 正向引导重构：命令式约束改为 LLM 权重倾向顺应引导
            - Awareness Block 移到末尾，Mission Brief 归入稳定前缀

            ## 冷块分层系统（RFC-0001v2）
            - TriageEngine: 消息分层引擎（Standby/Cold/Inject/Compress 四级）
            - StandbyCache: 待命缓存（LRU + 语义去重 + TTL）
            - ColdBuffer: 冷块缓冲（双写 + 批量 flush）
            - SessionStore ColdTier: message_blocks + FTS5 + union_search
            - 双轨召回: 热路径 FTS5 + 冷路径向量搜索

            ## Auto Pipeline 并行化
            - 串行步骤执行器改为并行 DAG 执行器
            - 独立步骤 tokio::join! 并发执行

            ## Tool View Schema Cache
            - LRU 缓存（128 cap），全 provider 共享

            ## 锁安全加固
            - ~55 处嵌套锁修复（clone→drop→acquire 模式）
            - ContextManager 15 锁排序文档

            ## Clippy 清零
            - abacus-core: 15 → 0 warnings

            ## KnowledgeStore 增强
            - FTS5 预过滤（10K→200 候选）

            ## TUI 改进
            - 模型名修复、context_window_ratio、thinking_depth 同步

            ## Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (arm64) | `abacus-aarch64-apple-darwin.tar.gz` |
            | Linux | x86_64 | `abacus-x86_64-linux-gnu.tar.gz` |

            ## Installation

            ```bash
            # macOS/Linux
            tar xzf abacus-*.tar.gz
            sudo mv abacus /usr/local/bin/
            ```
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
